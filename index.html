<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preload" href="./ibm-plex-sans.woff2" as="font" type="font/woff2" crossorigin/>
    <meta charset="utf-8">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>rmskhen — Redirecting</title>
    <meta name="description" content="Khen Ramos’ personal site.">
    <meta http-equiv="refresh" content="5; url=https://rmskhen.pages.dev">
    <style>
        @font-face {
            font-family: IBM Plex Sans;
            font-style: normal;
            font-weight: 100 700;
            font-stretch: 100%;
            font-display: block;
            src: url(./ibm-plex-sans.woff2);
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD
        }

        * {
            box-sizing: border-box;
            font-family: IBM Plex Sans;
            margin: 0;
            padding: 0
        }

        main p+p {
            margin-top: 1.5rem
        }

        header {
            background-color: #d3d3d3;
            display: block
        }

        nav {
            display: block
        }

        nav p.placeholder {
            font-weight: 600;
            font-size: 16px;
            line-height: 20px;
            display: inline-block;
            padding: .8rem 2rem
        }

        body {
            box-sizing: border-box
        }

        main {
            margin: 0 auto;
            padding: 3rem 2rem;
            max-width: 960px
        }

        a {
            color: #000;
            text-decoration: underline dotted dimgrey;
            text-underline-offset: 3px
        }

        a:hover {
            text-decoration: underline solid dimgrey;
            text-underline-offset: 3px
        }

        .heading-xxl-initial {
            font-size: 53px;
            line-height: 55px;
            margin-top: 0;
            margin-bottom: 1.5rem
        }

        .body-m {
            font-size: 19px;
            line-height: 25px
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #151515;
                color: floralwhite;
            }
        
            header {
                background-color: #303030;
            }
        
            a {
                color: floralwhite;
                text-decoration-color: floralwhite;
            }
        
            a:hover {
                text-decoration-color: floralwhite;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <p class="placeholder">...</p>
        </nav>
    </header>
    <main>
        <h1 class="heading-xxl-initial">Redirecting.</h1>
        <p class="body-m">You opened an address that’s no longer in use, so you’re being redirected.</p>
        <p class="body-m">If nothing happens in a few seconds, <a href="https://rmskhen.pages.dev">tap or click here</a> to continue.</p>
    </main>
</body>

</html>
