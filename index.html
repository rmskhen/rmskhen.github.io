<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="9; url=https://rmskhen.pages.dev">
    <title>rmskhen — Redirecting</title>
    <style>
    @font-face {
        font-display: swap;
        font-family: 'Inter';
        font-weight: 100 900;
        src: url(inter.woff2);
    }
    @font-face {
        font-display: swap;
        font-family: 'Mozilla Text';
        font-weight: 200 700;
        src: url(mozillaText.woff2);
    }
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    body {
        box-sizing: border-box;
        font-family: 'Inter';
    }
    header {
        background-color: floralwhite;
        border-bottom: 1px solid grey;
        display: block;
    }
    nav {
        display: block;
    }
    nav placeHolder {
        font-size: 1.1rem;
        display: inline-block;
        padding: 1rem 1.5rem;
        text-decoration: none;
    }
    .contentWrap {
        margin: 0 auto;
        padding-left: 1.5rem;
        padding-right: 1.5rem;
        max-width: 800px;
    }
    main {
        font-size: 1.1rem;
        padding-top: 1.5rem;
        padding-bottom: 1.5rem;
    }
    main p + p {
        margin-top: 0.9rem;
    }
    a {
        color: darkolivegreen;
        text-decoration: underline dotted darkolivegreen;
        text-underline-offset: 2px;
    }
    a:hover {
        text-decoration: underline solid darkolivegreen;
        text-underline-offset: 2px;
    }
    h1 {
        font-family: 'Mozilla Text';
        padding-top: 1.8rem;
        padding-bottom: 0.9rem;
    }
    /* .noSpace {
        margin-bottom: 0;
    } */
    </style>
</head>
<body>
    <header>
        <nav>
            <placeHolder>...</placeHolder>
        </nav>
    </header>
    <div class="contentWrap">
        <main>
            <h1>Redirecting...</h1>
            <p>You opened an address that’s no longer in use, so you’re being redirected.</p>
            <p>If nothing happens in a few seconds, <a href="https://rmskhen.pages.dev">tap or click here</a> to continue.</p>
        </main>
    </div>
</body>
</html>
